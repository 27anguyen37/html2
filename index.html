<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        /* General Styles & Removing all default black outlines */
        * { outline: none !important; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; color: #333; }
        header { background-color: #222; padding: 20px 0; text-align: center; border: none; }
        h1 { text-align: center; }
        
        /* Navigation Styles */
        nav button { background: none; border: none; color: #fff; margin: 0 15px; font-size: 1.1em; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; font-family: inherit; }
        nav button:hover { color: #aaa; }
        nav button.active-tab { font-weight: bold; border-bottom: 2px solid #fff; padding-bottom: 5px; }

        /* Page Section Styles - Hides pages by default */
        .page-section { display: none; max-width: 1000px; margin: 40px auto; padding: 20px; background: #fff; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: none; }
        
        /* Shows the Home page when you first load */
        #home { display: block; text-align: center; } 

        /* Slideshow Styles - Background changed to transparent to remove "borders" */
        .slideshow-container { position: relative; max-width: 900px; margin: auto; overflow: hidden; border-radius: 8px; background-color: transparent; border: none; }
        .slide { display: none; width: 100%; height: 500px; object-fit: contain; border: none; }
        .active-slide { display: block; }
        .prev, .next { cursor: pointer; position: absolute; top: 50%; width: auto; padding: 16px; margin-top: -22px; color: white; font-weight: bold; font-size: 18px; transition: 0.6s ease; user-select: none; background-color: rgba(0,0,0,0.5); border: none; }
        .next { right: 0; border-radius: 3px 0 0 3px; }
        .prev { left: 0; border-radius: 0 3px 3px 0; }
        .prev:hover, .next:hover { background-color: rgba(0,0,0,0.8); }

        /* Photo & Design Grid Styles */
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; padding: 20px 0; align-items: start; }
        .gallery img { width: 100%; height: auto; display: block; border-radius: 5px; transition: transform 0.3s ease; border: none; }
        .gallery img:hover { transform: scale(1.03); }

        /* Contact Page Styles */
        .contact-wrapper { display: flex; gap: 30px; flex-wrap: wrap; }
        .profile-section { flex: 1; min-width: 250px; text-align: center; }
        .profile-section img { width: 100%; max-width: 250px; border-radius: 8px; object-fit: contain; box-shadow: 0 2px 5px rgba(0,0,0,0.2); border: none; }
        .form-section { flex: 2; min-width: 300px; }
        .form-section h1 { margin-top: 0; text-align: left; }
        form { display: flex; flex-direction: column; gap: 15px; }
        label { font-weight: bold; }
        input, textarea { border: none; background-color: #e9e9e9; padding: 12px; border-radius: 4px; font-family: inherit; }
        textarea { resize: vertical; min-height: 100px; }
        button.submit-btn { padding: 10px 20px; background-color: #222; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; width: 200px; }
        button.submit-btn:hover { background-color: #444; }
    </style>
</head>
<body>

<header>
    <nav>
        <button class="tab-btn active-tab" onclick="openPage('home', this)">Home</button>
        <button class="tab-btn" onclick="openPage('photography', this)">Photography</button>
        <button class="tab-btn" onclick="openPage('design', this)">Design</button>
        <button class="tab-btn" onclick="openPage('contact', this)">Contact</button>
    </nav>
</header>

<div id="home" class="page-section">
    <h1>Welcome to My Portfolio</h1>
    <p>A collection of my photography and design work from this year.</p>

    <div class="slideshow-container">
        <img class="slide active-slide" src="photo1.jpg" alt="Slide 1">
        <img class="slide" src="design1.png" alt="Slide 2">
        <img class="slide" src="photo5.jpeg" alt="Slide 3">
        <img class="slide" src="design3.jpeg" alt="Slide 4">

        <a class="prev" onclick="changeSlide(-1)">&#10094;</a>
        <a class="next" onclick="changeSlide(1)">&#10095;</a>
    </div>
</div>

<div id="photography" class="page-section">
    <h1>Photography</h1>
    <div class="gallery">
        <img src="photo1.jpg" alt="Photography 1">
        <img src="photo2.jpg" alt="Photography 2">
        <img src="photo3.jpg" alt="Photography 3">
        <img src="photo4.jpg" alt="Photography 4">
        <img src="photo5.jpeg" alt="Photography 5">
        <img src="photo6.jpeg" alt="Photography 6">
        <img src="photo7.jpeg" alt="Photography 7">
        <img src="photo8.jpeg" alt="Photography 8">
        <img src="photo9.jpeg" alt="Photography 9">
        <img src="photo10.jpg" alt="Photography 10">
    </div>
</div>

<div id="design" class="page-section">
    <h1>Design Work</h1>
    <div class="gallery">
        <img src="design1.png" alt="Design 1">
        <img src="design2.png" alt="Design 2">
        <img src="design3.jpeg" alt="Design 3">
        <img src="design4.png" alt="Design 4">
        <img src="design5.png" alt="Design 5">
        <img src="design6.png" alt="Design 6">
        <img src="design7.jpeg" alt="Design 7">
        <img src="design8.png" alt="Design 8">
        <img src="design9.jpeg" alt="Design 9">
        <img src="design10.jpeg" alt="Design 10">
    </div>
</div>

<div id="contact" class="page-section">
    <div class="contact-wrapper">
        <div class="profile-section">
            <img src="me2.png" alt="Photo of me">
            <h3>Let's Connect</h3>
        </div>
        
        <div class="form-section">
            <h1>Contact Me</h1>
            <form action="#" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                
                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>
                
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </div>
</div>

<script>
    // Navigation Tabs Script
    function openPage(pageId, element) {
        let i, pageSections, tabButtons;
        pageSections = document.getElementsByClassName("page-section");
        for (i = 0; i < pageSections.length; i++) {
            pageSections[i].style.display = "none";
        }
        tabButtons = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tabButtons.length; i++) {
            tabButtons[i].classList.remove("active-tab");
        }
        document.getElementById(pageId).style.display = "block";
        element.classList.add("active-tab");
    }

    // Slideshow Script
    let slideIndex = 0;
    const slides = document.querySelectorAll(".slide");

    function changeSlide(n) {
        slides[slideIndex].classList.remove("active-slide");
        slideIndex = (slideIndex + n + slides.length) % slides.length;
        slides[slideIndex].classList.add("active-slide");
    }
</script>

</body>
</html>
